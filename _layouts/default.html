<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ site.title }}</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #0a0a0a; --accent: #D4A853; --accent-light: #e8c97a;
  --accent-glow: rgba(212, 168, 83, 0.15); --bg-dark: #050505;
  --bg-section: #0c0c0c; --bg-card: #111111; --text-primary: #f5f5f5;
  --text-secondary: #999; --text-muted: #666; --border: rgba(255,255,255,0.06);
  --gradient-gold: linear-gradient(135deg, #D4A853, #f0d78c, #D4A853);
}
html { scroll-behavior: smooth; font-size: 16px; }
body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-dark); color: var(--text-primary); overflow-x: hidden; -webkit-font-smoothing: antialiased; }
.container { max-width: 1280px; margin: 0 auto; padding: 0 clamp(1.5rem, 4vw, 4rem); }
.section-label { font-family: 'Space Grotesk', sans-serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 1rem; display: inline-block; }
.section-title { font-family: 'Space Grotesk', sans-serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 700; line-height: 1.15; color: var(--text-primary); margin-bottom: 1.5rem; }
.section-subtitle { font-size: 1.1rem; color: var(--text-secondary); line-height: 1.7; max-width: 680px; }
.reveal { opacity: 0; transform: translateY(50px); transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1), transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
.reveal.visible { opacity: 1; transform: translateY(0); }
.reveal-delay-1 { transition-delay: 0.1s; } .reveal-delay-2 { transition-delay: 0.2s; }
.reveal-delay-3 { transition-delay: 0.3s; } .reveal-delay-4 { transition-delay: 0.4s; }
nav { position: fixed; top: 0; width: 100%; z-index: 1000; padding: 1.25rem 0; background: rgba(5,5,5,0.7); backdrop-filter: blur(20px) saturate(1.8); border-bottom: 1px solid var(--border); transition: all 0.4s ease; }
nav.scrolled { padding: 0.75rem 0; background: rgba(5,5,5,0.92); }
nav .container { display: flex; align-items: center; justify-content: space-between; }
.logo { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; letter-spacing: -0.02em; background: var(--gradient-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.nav-links { display: flex; gap: 2rem; list-style: none; }
.nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 0.85rem; font-weight: 500; letter-spacing: 0.03em; transition: color 0.3s; }
.nav-links a:hover { color: var(--accent); }
.nav-cta { padding: 0.6rem 1.5rem; border: 1px solid var(--accent); border-radius: 100px; color: var(--accent) !important; transition: all 0.3s !important; }
.nav-cta:hover { background: var(--accent); color: var(--bg-dark) !important; }
.mobile-toggle { display: none; background: none; border: none; color: var(--text-primary); font-size: 1.5rem; cursor: pointer; }
.hero { min-height: 100vh; display: flex; align-items: center; position: relative; overflow: hidden; padding-top: 5rem; }
.hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 70% 40%, rgba(212,168,83,0.06) 0%, transparent 70%), radial-gradient(ellipse 50% 50% at 20% 80%, rgba(212,168,83,0.04) 0%, transparent 60%); }
.hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; position: relative; z-index: 1; }
.hero-content { max-width: 640px; }
.hero-tag { display: inline-flex; align-items: center; gap: 0.5rem; padding: 0.5rem 1rem; border-radius: 100px; background: rgba(212,168,83,0.08); border: 1px solid rgba(212,168,83,0.15); font-size: 0.8rem; color: var(--accent); font-weight: 500; margin-bottom: 2rem; }
.hero-tag .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
.hero h1 { font-family: 'Space Grotesk', sans-serif; font-size: clamp(2.8rem, 6vw, 4.5rem); font-weight: 800; line-height: 1.05; letter-spacing: -0.03em; margin-bottom: 1.5rem; }
.hero h1 .gold { background: var(--gradient-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.hero p { font-size: 1.15rem; color: var(--text-secondary); line-height: 1.75; margin-bottom: 2.5rem; max-width: 520px; }
.hero-buttons { display: flex; gap: 1rem; flex-wrap: wrap; }
.btn-primary { display: inline-flex; align-items: center; gap: 0.5rem; padding: 1rem 2rem; background: var(--accent); color: var(--bg-dark); border: none; border-radius: 100px; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: all 0.3s; text-decoration: none; }
.btn-primary:hover { background: var(--accent-light); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(212,168,83,0.25); }
.btn-secondary { display: inline-flex; align-items: center; gap: 0.5rem; padding: 1rem 2rem; background: transparent; color: var(--text-primary); border: 1px solid var(--border); border-radius: 100px; font-weight: 500; font-size: 0.95rem; cursor: pointer; transition: all 0.3s; text-decoration: none; }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.hero-visual { position: relative; display: flex; justify-content: center; }
.hero-orb { width: 420px; height: 420px; border-radius: 50%; position: relative; background: radial-gradient(circle at 30% 30%, rgba(212,168,83,0.12), transparent 70%); border: 1px solid rgba(212,168,83,0.08); animation: float 8s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(3deg); } }
.orb-ring { position: absolute; border-radius: 50%; border: 1px solid rgba(212,168,83,0.1); }
.orb-ring-1 { inset: -30px; animation: spin 30s linear infinite; }
.orb-ring-2 { inset: -70px; animation: spin 45s linear infinite reverse; border-style: dashed; }
@keyframes spin { to { transform: rotate(360deg); } }
.orb-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
.orb-text .letters { font-family: 'Space Grotesk', sans-serif; font-size: 4rem; font-weight: 800; background: var(--gradient-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: -0.03em; }
.orb-text .sub { font-size: 0.7rem; color: var(--text-muted); letter-spacing: 0.3em; text-transform: uppercase; margin-top: 0.25rem; }
.orb-badge { position: absolute; padding: 0.75rem 1.25rem; border-radius: 16px; background: rgba(17,17,17,0.9); border: 1px solid var(--border); backdrop-filter: blur(10px); font-size: 0.8rem; white-space: nowrap; }
.orb-badge-1 { top: 10%; right: -10%; color: var(--accent); }
.orb-badge-2 { bottom: 15%; left: -15%; color: var(--text-secondary); }
.orb-badge-3 { top: 55%; right: -20%; color: var(--text-secondary); }
.marquee-bar { overflow: hidden; padding: 1.25rem 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--bg-section); }
.marquee-track { display: flex; gap: 4rem; animation: marquee 20s linear infinite; width: max-content; }
@keyframes marquee { to { transform: translateX(-50%); } }
.marquee-track span { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 600; color: var(--text-muted); white-space: nowrap; text-transform: uppercase; letter-spacing: 0.15em; }
.marquee-track .sep { color: var(--accent); }
.stats-bar { padding: 4rem 0; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); background: var(--bg-section); }
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2rem; text-align: center; }
.stat-item h3 { font-family: 'Space Grotesk', sans-serif; font-size: 2.75rem; font-weight: 700; background: var(--gradient-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.stat-item p { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.5rem; letter-spacing: 0.05em; text-transform: uppercase; }
.pillars { padding: 8rem 0; }
.pillars-header { text-align: center; margin-bottom: 5rem; }
.pillars-header .section-subtitle { margin: 0 auto; }
.pillar-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
.pillar-card { padding: 2.5rem; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-card); position: relative; overflow: hidden; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
.pillar-card:hover { border-color: rgba(212,168,83,0.2); transform: translateY(-4px); }
.pillar-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--gradient-gold); opacity: 0; transition: opacity 0.4s; }
.pillar-card:hover::before { opacity: 1; }
.pillar-number { font-family: 'Space Grotesk', sans-serif; font-size: 4rem; font-weight: 800; color: rgba(212,168,83,0.08); position: absolute; top: 1rem; right: 1.5rem; }
.pillar-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; background: var(--accent-glow); margin-bottom: 1.5rem; font-size: 1.3rem; }
.pillar-card h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; }
.pillar-card .desc { color: var(--text-secondary); line-height: 1.7; font-size: 0.95rem; margin-bottom: 1.5rem; }
.pillar-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
.pillar-tag { padding: 0.35rem 0.85rem; border-radius: 100px; font-size: 0.75rem; background: rgba(212,168,83,0.06); color: var(--accent); border: 1px solid rgba(212,168,83,0.1); }
.pillar-outcome { margin-top: 1.25rem; padding-top: 1.25rem; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-muted); font-style: italic; }
.bot-model { padding: 8rem 0; background: var(--bg-section); }
.bot-content { display: grid; grid-template-columns: 1fr 1fr; gap: 5rem; align-items: center; }
.bot-left .section-subtitle { margin-bottom: 2rem; }
.timeline { position: relative; }
.timeline::before { content: ''; position: absolute; left: 23px; top: 0; bottom: 0; width: 2px; background: linear-gradient(to bottom, var(--accent), rgba(212,168,83,0.1)); }
.timeline-item { display: flex; gap: 1.5rem; margin-bottom: 2.5rem; position: relative; }
.timeline-dot { width: 48px; height: 48px; min-width: 48px; border-radius: 50%; background: var(--bg-card); border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 0.85rem; color: var(--accent); z-index: 1; }
.timeline-content h4 { font-family: 'Space Grotesk', sans-serif; font-size: 1.15rem; font-weight: 600; margin-bottom: 0.4rem; }
.timeline-content p { font-size: 0.9rem; color: var(--text-secondary); line-height: 1.65; }
.founder { padding: 8rem 0; }
.founder-grid { display: grid; grid-template-columns: 0.9fr 1.1fr; gap: 5rem; align-items: center; }
.founder-image-wrap { position: relative; }
.founder-image-frame { width: 100%; aspect-ratio: 3/4; border-radius: 24px; overflow: hidden; background: linear-gradient(135deg, rgba(212,168,83,0.1), rgba(212,168,83,0.03)); border: 1px solid rgba(212,168,83,0.1); position: relative; display: flex; align-items: center; justify-content: center; }
.founder-image-frame img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
.founder-badge { position: absolute; bottom: -1rem; right: -1rem; padding: 1rem 1.5rem; background: var(--accent); border-radius: 16px; color: var(--bg-dark); font-weight: 700; font-size: 0.85rem; }
.founder-text h3 { font-family: 'Space Grotesk', sans-serif; font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
.founder-text .role { color: var(--accent); font-size: 1rem; font-weight: 500; margin-bottom: 1.5rem; }
.founder-text p { color: var(--text-secondary); line-height: 1.75; font-size: 1rem; margin-bottom: 1rem; }
.founder-highlights { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 2rem; }
.highlight-item { padding: 1.25rem; border-radius: 14px; background: var(--bg-card); border: 1px solid var(--border); }
.highlight-item .emoji { font-size: 1.25rem; margin-bottom: 0.5rem; }
.highlight-item h5 { font-size: 0.85rem; font-weight: 600; margin-bottom: 0.25rem; }
.highlight-item p { font-size: 0.78rem; color: var(--text-muted); }
.who-we-help { padding: 8rem 0; background: var(--bg-section); }
.help-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; margin-top: 4rem; }
.help-card { padding: 2rem; border-radius: 16px; border: 1px solid var(--border); background: var(--bg-card); transition: all 0.4s; position: relative; overflow: hidden; }
.help-card:hover { border-color: rgba(212,168,83,0.2); transform: translateY(-3px); }
.help-card .icon-wrap { width: 44px; height: 44px; border-radius: 10px; display: flex; align-items: center; justify-content: center; background: var(--accent-glow); margin-bottom: 1.25rem; font-size: 1.2rem; }
.help-card h4 { font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; font-weight: 600; margin-bottom: 0.6rem; }
.help-card p { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.65; }
.recognition { padding: 8rem 0; }
.recog-content { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
.recog-badges { display: flex; gap: 2rem; flex-wrap: wrap; }
.recog-badge { flex: 1; min-width: 200px; padding: 2.5rem; border-radius: 20px; border: 1px solid var(--border); background: var(--bg-card); text-align: center; transition: all 0.4s; }
.recog-badge:hover { border-color: rgba(212,168,83,0.2); }
.recog-badge .badge-icon { font-size: 2.5rem; margin-bottom: 1rem; }
.recog-badge h4 { font-family: 'Space Grotesk', sans-serif; font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
.recog-badge p { font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; }
.insights { padding: 8rem 0; background: var(--bg-section); }
.insights-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-top: 4rem; }
.insight-card { border-radius: 20px; border: 1px solid var(--border); background: var(--bg-card); overflow: hidden; transition: all 0.4s; }
.insight-card:hover { border-color: rgba(212,168,83,0.2); transform: translateY(-4px); }
.insight-thumb { height: 180px; background: linear-gradient(135deg, rgba(212,168,83,0.08), rgba(212,168,83,0.02)); display: flex; align-items: center; justify-content: center; font-size: 2.5rem; border-bottom: 1px solid var(--border); }
.insight-body { padding: 1.75rem; }
.insight-body .tag { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; margin-bottom: 0.75rem; display: block; }
.insight-body h4 { font-family: 'Space Grotesk', sans-serif; font-size: 1.05rem; font-weight: 600; line-height: 1.4; margin-bottom: 0.75rem; }
.insight-body p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; margin-bottom: 1.25rem; }
.read-more { font-size: 0.85rem; color: var(--accent); text-decoration: none; font-weight: 500; display: inline-flex; align-items: center; gap: 0.35rem; transition: gap 0.3s; }
.read-more:hover { gap: 0.65rem; }
.cta-section { padding: 8rem 0; text-align: center; position: relative; overflow: hidden; }
.cta-section::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(212,168,83,0.06), transparent 70%); }
.cta-section .container { position: relative; z-index: 1; }
.cta-section h2 { font-family: 'Space Grotesk', sans-serif; font-size: clamp(2rem, 4.5vw, 3.2rem); font-weight: 700; margin-bottom: 1.25rem; }
.cta-section p { font-size: 1.1rem; color: var(--text-secondary); max-width: 600px; margin: 0 auto 2.5rem; }
.cta-buttons { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
footer { padding: 4rem 0 2rem; border-top: 1px solid var(--border); background: var(--bg-dark); }
.footer-grid { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 3rem; margin-bottom: 3rem; }
.footer-brand .logo { margin-bottom: 1rem; display: inline-block; }
.footer-brand p { font-size: 0.88rem; color: var(--text-muted); line-height: 1.65; max-width: 300px; }
.footer-col h5 { font-family: 'Space Grotesk', sans-serif; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-secondary); margin-bottom: 1.25rem; }
.footer-col a { display: block; color: var(--text-muted); text-decoration: none; font-size: 0.88rem; margin-bottom: 0.75rem; transition: color 0.3s; }
.footer-col a:hover { color: var(--accent); }
.footer-bottom { padding-top: 2rem; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
.footer-bottom p { font-size: 0.8rem; color: var(--text-muted); }
.footer-socials { display: flex; gap: 1rem; }
.footer-socials a { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; transition: all 0.3s; }
.footer-socials a:hover { border-color: var(--accent); color: var(--accent); }
body::after { content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E"); background-repeat: repeat; background-size: 256px; }
@media (max-width: 1024px) { .hero-grid, .bot-content, .founder-grid, .recog-content { grid-template-columns: 1fr; } .hero-visual { display: none; } .pillar-grid { grid-template-columns: 1fr; } .help-grid, .insights-grid { grid-template-columns: 1fr 1fr; } .footer-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 768px) { .nav-links { display: none; } .mobile-toggle { display: block; } .stats-grid { grid-template-columns: 1fr 1fr; gap: 2rem; } .help-grid, .insights-grid { grid-template-columns: 1fr; } .founder-highlights { grid-template-columns: 1fr; } .footer-grid { grid-template-columns: 1fr; } }
</style>
</head>

<script>
const observer = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); }); }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });
document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
window.addEventListener('scroll', () => { document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 50); });
document.querySelectorAll('a[href^="#"]').forEach(anchor => { anchor.addEventListener('click', function(e) { e.preventDefault(); const target = document.querySelector(this.getAttribute('href')); if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }); });
// Netlify Identity redirect
if (window.netlifyIdentity) { window.netlifyIdentity.on("init", user => { if (!user) { window.netlifyIdentity.on("login", () => { document.location.href = "/admin/"; }); } }); }
</script>
